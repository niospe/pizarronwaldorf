<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin - Agregar Negocio | Walfordf</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        
        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #5E4B5E;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #6B5E6B;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #E8D9E8;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
            background: white;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--pastel-purple);
            box-shadow: 0 0 0 4px rgba(224, 187, 228, 0.2);
        }
        
        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .radio-option {
            flex: 1;
        }
        
        .radio-option input[type="radio"] {
            display: none;
        }
        
        .radio-option label {
            display: block;
            padding: 12px;
            text-align: center;
            background: #F5EAF5;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .radio-option input[type="radio"]:checked + label {
            background: var(--pastel-purple);
            border-color: #B28BB2;
            transform: scale(1.02);
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--pastel-purple), var(--pastel-pink));
            color: #5E4B5E;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(224, 187, 228, 0.4);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #B28BB2;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link i {
            margin-right: 5px;
        }
        
        .back-link:hover {
            color: #9A7A9A;
        }
        
        .message {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #B5EAD7;
            color: #2E5A4B;
            display: block;
        }
        
        .message.error {
            background: #FFD1DC;
            color: #8B4B5E;
            display: block;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="../index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al directorio
        </a>
        
        <div class="form-card fade-in">
            <h2 class="form-title">🌸 Agregar Nuevo Negocio</h2>
            
            <div id="message" class="message"></div>
            
            <form id="businessForm">
                <div class="form-group">
                    <label for="titulo">Nombre del negocio/servicio *</label>
                    <input type="text" id="titulo" name="titulo" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>Tipo *</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="negocio" name="tipo" value="negocio" checked>
                            <label for="negocio">🏪 Negocio</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="servicio" name="tipo" value="servicio">
                            <label for="servicio">🛠️ Servicio</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción *</label>
                    <textarea id="descripcion" name="descripcion" class="form-control" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="whatsapp">WhatsApp (solo números, ej: 5491123456789)</label>
                    <input type="tel" id="whatsapp" name="whatsapp" class="form-control" placeholder="5491123456789">
                </div>
                
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" class="form-control">
                </div>
                
                <div class="form-group">
                    <label for="web">Página web</label>
                    <input type="url" id="web" name="web" class="form-control" placeholder="https://ejemplo.com">
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-plus-circle"></i> Agregar Negocio
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: #A58DA5;">
                * Los datos se guardarán en el archivo Excel de la comunidad
            </p>
        </div>
    </div>
    
    <script>
        document.getElementById('businessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Recoger datos del formulario
            const formData = new FormData(this);
            const negocio = {
                id: Date.now(),
                titulo: formData.get('titulo'),
                tipo: formData.get('tipo'),
                descripcion: formData.get('descripcion'),
                whatsapp: formData.get('whatsapp'),
                email: formData.get('email'),
                web: formData.get('web')
            };
            
            // Validar que al menos un contacto tenga datos
            if (!negocio.whatsapp && !negocio.email && !negocio.web) {
                mostrarMensaje('Debes proporcionar al menos un medio de contacto (WhatsApp, Email o Web)', 'error');
                return;
            }
            
            // Aquí normalmente enviarías los datos a un servidor
            // Por ahora, guardamos en localStorage como ejemplo
            guardarEnLocalStorage(negocio);
            
            // También podrías generar un archivo CSV/Excel
            generarCSV(negocio);
            
            mostrarMensaje('¡Negocio agregado con éxito! Pronto aparecerá en el directorio.', 'success');
            this.reset();
        });
        
        function guardarEnLocalStorage(negocio) {
            let negocios = JSON.parse(localStorage.getItem('negociosWalfordf') || '[]');
            negocios.push(negocio);
            localStorage.setItem('negociosWalfordf', JSON.stringify(negocios));
        }
        
        function generarCSV(negocio) {
            // Crear línea CSV
            const csvLine = `${negocio.titulo},${negocio.tipo},${negocio.descripcion},${negocio.whatsapp || ''},${negocio.email || ''},${negocio.web || ''}\n`;
            
            // Aquí normalmente enviarías esto a un servidor
            console.log('CSV generado:', csvLine);
            
            // Mostrar instrucciones para descargar
            alert('Los datos se han guardado. El administrador los incorporará al archivo Excel de la comunidad.');
        }
        
        function mostrarMensaje(texto, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = texto;
            messageDiv.className = `message ${tipo}`;
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
